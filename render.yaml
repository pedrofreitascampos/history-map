services:
  - type: web
    name: history-map
    runtime: node
    plan: free
    buildCommand: npm ci
    startCommand: node server/index.js
    envVars:
      - key: JWT_SECRET
        generateValue: true
      - key: NODE_ENV
        value: production
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_PLACES_KEY
        sync: false
      - key: ALLOWED_EMAILS
        sync: false
      - key: ALLOWED_ORIGINS
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
