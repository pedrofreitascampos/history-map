<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Shared Trip — Oikumene</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #0f0f12; color: #e8e8f0; min-height: 100vh; display: flex; flex-direction: column; }
    #header { padding: 20px 24px 16px; border-bottom: 1px solid #2a2a3a; }
    #trip-name { font-size: 22px; font-weight: 700; line-height: 1.2; }
    #trip-meta { font-size: 13px; color: #888; margin-top: 4px; }
    #map { height: 340px; flex-shrink: 0; }
    #stops { padding: 16px 24px 8px; max-width: 680px; width: 100%; margin: 0 auto; flex: 1; }
    .stop { display: flex; gap: 12px; align-items: flex-start; padding: 12px 0; border-bottom: 1px solid #1e1e2a; }
    .stop:last-child { border-bottom: none; }
    .stop-num { width: 26px; height: 26px; border-radius: 50%; background: var(--tc, #5865f2); color: #fff; font-size: 11px; font-weight: 700; display: flex; align-items: center; justify-content: center; flex-shrink: 0; margin-top: 2px; }
    .stop-name { font-size: 15px; font-weight: 600; }
    .stop-addr { font-size: 12px; color: #888; margin-top: 2px; }
    .stop-tags { display: flex; gap: 4px; flex-wrap: wrap; margin-top: 4px; }
    .stop-tag { font-size: 11px; background: #1e1e2a; border: 1px solid #2a2a3a; border-radius: 8px; padding: 1px 6px; color: #aaa; }
    #footer { padding: 16px 24px; text-align: center; font-size: 12px; color: #555; }
    #footer a { color: #5865f2; text-decoration: none; }
    #footer a:hover { text-decoration: underline; }
    .error-state { padding: 60px 24px; text-align: center; }
    .error-state h2 { font-size: 20px; margin-bottom: 8px; }
    .error-state p { color: #888; font-size: 14px; }
    @media (max-width: 480px) {
      #header { padding: 16px 16px 12px; }
      #stops { padding: 12px 16px 8px; }
      #map { height: 260px; }
    }
  </style>
</head>
<body>
  <div id="header">
    <div id="trip-name">Loading…</div>
    <div id="trip-meta"></div>
  </div>
  <div id="map"></div>
  <div id="stops"></div>
  <div id="footer">
    <p>Shared via <a href="/">Oikumene</a> — Track, discover, and remember every place.</p>
  </div>
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" crossorigin="anonymous"></script>
  <script nonce="__CSP_NONCE__">
    (async () => {
      const token = location.pathname.replace(/^\/s\//, '').replace(/\/$/, '');
      if (!token || !/^[0-9a-f]{40}$/.test(token)) {
        showError('Invalid link', 'This share link is not valid.');
        return;
      }
      let data;
      try {
        const res = await fetch('/api/share/' + token);
        if (!res.ok) throw new Error('not found');
        data = await res.json();
      } catch (_) {
        showError('Trip not found', 'This share link may have been revoked or does not exist.');
        return;
      }

      const { trip, locations } = data;
      const color = trip.color || '#5865f2';
      document.title = trip.name + ' — Oikumene';
      document.getElementById('trip-name').textContent = trip.name;
      document.documentElement.style.setProperty('--tc', color);

      const meta = [];
      if (trip.startDate) {
        meta.push(trip.startDate + (trip.endDate && trip.endDate !== trip.startDate ? ' → ' + trip.endDate : ''));
      }
      meta.push(locations.length + ' stop' + (locations.length !== 1 ? 's' : ''));
      document.getElementById('trip-meta').textContent = meta.join(' · ');

      const withCoords = locations.filter(l => l.lat != null && l.lng != null);

      if (withCoords.length > 0) {
        const map = L.map('map');
        L.tileLayer('https://tiles.stadiamaps.com/tiles/alidade_smooth_dark/{z}/{x}/{y}{r}.png', {
          maxZoom: 20,
          attribution: '© <a href="https://stadiamaps.com/">Stadia</a> © <a href="https://openmaptiles.org/">OpenMapTiles</a> © <a href="https://www.openstreetmap.org/copyright">OSM</a>',
        }).addTo(map);

        const bounds = L.latLngBounds(withCoords.map(l => [l.lat, l.lng]));
        map.fitBounds(bounds, { padding: [32, 32] });

        if (withCoords.length > 1) {
          L.polyline(withCoords.map(l => [l.lat, l.lng]), {
            color, weight: 2.5, opacity: 0.7, dashArray: '6 4',
          }).addTo(map);
        }

        withCoords.forEach((loc, idx) => {
          const icon = L.divIcon({
            html: `<div style="width:26px;height:26px;border-radius:50%;background:${color};color:#fff;font-size:11px;font-weight:700;display:flex;align-items:center;justify-content:center;border:2px solid #fff;box-shadow:0 2px 6px rgba(0,0,0,.4)">${idx + 1}</div>`,
            className: '',
            iconSize: [26, 26],
            iconAnchor: [13, 13],
          });
          const popup = `<strong>${esc(loc.name)}</strong>${loc.address ? '<br><span style="font-size:12px">' + esc(loc.address) + '</span>' : ''}`;
          L.marker([loc.lat, loc.lng], { icon }).bindPopup(popup).addTo(map);
        });
      } else {
        document.getElementById('map').style.display = 'none';
      }

      const stopsEl = document.getElementById('stops');
      if (locations.length === 0) {
        stopsEl.innerHTML = '<p style="padding:24px 0;color:#888;text-align:center;">No stops in this trip.</p>';
        return;
      }
      stopsEl.innerHTML = locations.map((loc, idx) => {
        const tags = (loc.tags || []).map(t => `<span class="stop-tag">${esc(t)}</span>`).join('');
        return `<div class="stop">
          <div class="stop-num">${idx + 1}</div>
          <div>
            <div class="stop-name">${esc(loc.name || 'Unnamed')}</div>
            ${loc.address ? `<div class="stop-addr">${esc(loc.address)}</div>` : ''}
            ${tags ? `<div class="stop-tags">${tags}</div>` : ''}
          </div>
        </div>`;
      }).join('');
    })();

    function esc(str) {
      return String(str || '').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
    }
    function showError(title, msg) {
      document.getElementById('trip-name').textContent = title;
      document.getElementById('map').style.display = 'none';
      document.getElementById('stops').innerHTML = `<div class="error-state"><h2>${esc(title)}</h2><p>${esc(msg)}</p></div>`;
    }
  </script>
</body>
</html>
